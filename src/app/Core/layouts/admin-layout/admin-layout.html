<div class="app-layout" [class.sidebar-collapsed]="sidebarCollapsed">
    <header class="app-header">
        <app-header-component [sidebarCollapsed]="sidebarCollapsed" (toggleSidebar)="toggleSidebar()"></app-header-component>
    </header>

    <div class="app-body">
        <aside class="app-sidebar">
            <app-navbar [collapsed]="sidebarCollapsed" (closeSidebar)="closeSidebar()"></app-navbar>
        </aside>

        <main class="main-content">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
