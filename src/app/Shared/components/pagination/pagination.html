<div class="pagination-container">

    <div class="pagination-info">

        Mostrando

        {{ pagination().from }}

        a

        {{ pagination().to }}

        de

        {{ pagination().total }}

        registros

    </div>

    <div class="pagination-controls">

        <button class="pagination-btn" (click)="previousPage()" [disabled]="pagination(). current_page === 1">

            <i class="fas fa-chevron-left"></i>

        </button>

        @for(page of pages(); track page){

            <button class="pagination-btn" [class.active]="page === pagination().current_page" (click)="goToPage(page)">
                {{ page }}
            </button>
        }

        <button class="pagination-btn" (click)="nextPage()" [disabled]="pagination().current_page === pagination().last_page">
            <i class="fas fa-chevron-right"></i>
        </button>

    </div>

</div>
